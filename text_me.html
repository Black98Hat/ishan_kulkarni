<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ishan | Digital Counterpart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Apple-esque Typography and Variables */
        :root {
            --bg-color: #e8e8ed; /* Slightly darker outer bg to make the box pop */
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --spring-easing: cubic-bezier(0.25, 1, 0.5, 1);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Cinematic Fluid Background - Sits behind the box */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            background: linear-gradient(135deg, #e2e4ea 0%, #f3f5f8 100%);
        }

        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.6;
            animation: drift 25s infinite alternate ease-in-out;
        }

        /* More vibrant blobs to refract through the glass box */
        .blob-1 {
            width: 65vw;
            height: 65vw;
            background: radial-gradient(circle, rgba(180,200,245,0.8) 0%, rgba(255,255,255,0) 70%);
            top: -15%;
            left: -10%;
        }

        .blob-2 {
            width: 55vw;
            height: 55vw;
            background: radial-gradient(circle, rgba(235,210,240,0.8) 0%, rgba(255,255,255,0) 70%);
            bottom: -15%;
            right: -10%;
            animation-delay: -10s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(8%, 12%) scale(1.15); }
            100% { transform: translate(-8%, -5%) scale(0.9); }
        }

        /* Layout & Scrolling - The "Box" */
        .stage {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.85); /* Solid default for mobile */
        }

        /* Desktop "Insane" Boxed Layout */
        @media (min-width: 768px) {
            .stage {
                width: 92vw;
                max-width: 1200px;
                height: 90vh;
                max-height: 850px;
                border-radius: 36px;
                background: linear-gradient(180deg, rgba(255, 255, 255, 0.75) 0%, rgba(255, 255, 255, 0.45) 100%);
                backdrop-filter: blur(48px);
                -webkit-backdrop-filter: blur(48px);
                box-shadow: 
                    0 50px 100px -20px rgba(0, 0, 0, 0.12),
                    0 30px 60px -30px rgba(0, 0, 0, 0.08),
                    inset 0 1px 2px rgba(255, 255, 255, 0.9),
                    inset 0 0 0 1px rgba(255, 255, 255, 0.4);
                animation: stageEnter 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
                overflow: hidden;
            }
        }

        @keyframes stageEnter {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .conversation-area {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding: 120px 6% 150px 6%;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .conversation-area::-webkit-scrollbar {
            display: none;
        }

        .message-wrapper {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        /* Message Styles */
        .message {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s var(--spring-easing) forwards;
            will-change: transform, opacity;
        }

        .msg-user {
            align-self: flex-end;
            text-align: right;
            max-width: 70%;
        }

        .msg-user .text {
            font-size: 1.125rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: -0.01em;
        }

        .msg-ai {
            align-self: flex-start;
            max-width: 85%;
        }

        .msg-ai .text {
            font-size: 1.75rem;
            font-weight: 300;
            line-height: 1.4;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        @media (max-width: 768px) {
            .msg-ai .text { font-size: 1.35rem; }
        }

        /* Input Area - Glassmorphic Pill */
        .input-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 650px;
            z-index: 20;
            transition: transform 0.4s var(--spring-easing);
        }

        .glass-pill {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            padding: 0.5rem 0.5rem 0.5rem 1.5rem;
            display: flex;
            align-items: center;
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.06), 
                0 1px 3px rgba(0,0,0,0.03),
                inset 0 1px 1px rgba(255,255,255,0.8);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .glass-pill:focus-within {
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.1), 
                0 2px 6px rgba(0,0,0,0.04),
                inset 0 1px 1px rgba(255,255,255,1);
            background: rgba(255, 255, 255, 0.95);
            transform: translateY(-2px) scale(1.01);
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1.05rem;
            color: var(--text-main);
            font-weight: 400;
        }

        input[type="text"]::placeholder {
            color: #a1a1a6;
        }

        .send-btn {
            background: var(--text-main);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
            background: #000;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Animations */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            height: 24px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .typing-indicator.active {
            opacity: 1;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Header Logo */
        .brand {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            z-index: 20;
            opacity: 0;
            animation: fadeInUp 1s 0.8s forwards;
        }
    </style>
</head>
<body>

    <!-- Cinematic Background Behind the App -->
    <div class="ambient-bg">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
    </div>

    <!-- Main Floating Stage (Boxed on Desktop, Fullscreen on Mobile) -->
    <div class="stage">
        
        <div class="brand">Ishan AI</div>

        <div class="conversation-area" id="scroll-area">
            <div class="message-wrapper" id="chat">
                <!-- Initial Hero Message -->
                <div class="message msg-ai" style="animation-delay: 0.4s;">
                    <div class="text">Hello. I am the digital reflection of Ishan.<br>What would you like to know?</div>
                </div>
            </div>
            
            <!-- Typing Indicator (Hidden by default) -->
            <div class="message-wrapper mt-8">
                 <div class="msg-ai">
                    <div class="typing-indicator" id="typing">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-container">
            <div class="glass-pill">
                <input 
                    type="text" 
                    id="input" 
                    placeholder="Ask about my work, vision, or ideas..." 
                    autocomplete="off"
                    onkeypress="handleKeyPress(event)"
                />
                <button id="send-btn" class="send-btn" onclick="send()" aria-label="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </button>
            </div>
        </div>

    </div>

    <script>
        const inputField = document.getElementById("input");
        const chatContainer = document.getElementById("chat");
        const scrollArea = document.getElementById("scroll-area");
        const typingIndicator = document.getElementById("typing");
        const sendBtn = document.getElementById("send-btn");

        function formatText(text) {
            return text.replace(/\n/g, '<br>');
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement("div");
            msgDiv.className = `message msg-${sender}`;
            
            const textDiv = document.createElement("div");
            textDiv.className = "text";
            textDiv.innerHTML = formatText(text);
            
            msgDiv.appendChild(textDiv);
            chatContainer.appendChild(msgDiv);
            
            scrollToBottom();
        }

        function scrollToBottom() {
            setTimeout(() => {
                scrollArea.scrollTo({
                    top: scrollArea.scrollHeight,
                    behavior: 'smooth'
                });
            }, 10);
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                send();
            }
        }

        async function send() {
            const input = inputField.value.trim();
            if (!input) return;

            appendMessage(input, "user");
            inputField.value = "";
            inputField.blur();
            
            sendBtn.disabled = true;
            typingIndicator.classList.add("active");
            scrollToBottom();

            try {
                const res = await fetch("https://ishan-ai-chat.vercel.app/api/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ message: input })
                });

                if (!res.ok) throw new Error("Network response was not ok");
                
                const data = await res.json();
                
                typingIndicator.classList.remove("active");
                
                setTimeout(() => {
                    appendMessage(data.reply || "I'm sorry, I couldn't process that.", "ai");
                    sendBtn.disabled = false;
                    inputField.focus();
                }, 300);

            } catch (error) {
                console.error("Error connecting to Ishan AI:", error);
                typingIndicator.classList.remove("active");
                setTimeout(() => {
                    appendMessage("I'm currently experiencing a connection issue. Please try again in a moment.", "ai");
                    sendBtn.disabled = false;
                }, 300);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            if(window.innerWidth > 768) {
                setTimeout(() => inputField.focus(), 1400); // Waits for the entrance animation
            }
        });
    </script>
</body>
</html>
